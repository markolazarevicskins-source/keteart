<!DOCTYPE html>
<html>
<head>
    <title>Nikola Gacesa - Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="login">
        <input id="email" placeholder="Email"><br>
        <input id="pass" type="password" placeholder="Lozinka"><br>
        <button onclick="login()">Prijava</button>
    </div>

    <div id="admin" style="display:none">
        <input type="file" id="slika" onchange="pretvoriUSliku(this)"><br>
        <img id="preview" style="max-width:300px; display:none"><br>
        <input id="naslov" placeholder="Naslov"><br>
        <input id="cena" type="number" placeholder="Cena"><br>
        <button onclick="sacuvaj()">SACUVAJ</button>
        <div id="lista"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2M4L84Vmjd6QCs9J5HxtH9A8h1xoxR1o",
            authDomain: "nikola-gacesa-galerija.firebaseapp.com",
            projectId: "nikola-gacesa-galerija",
            storageBucket: "nikola-gacesa-galerija.firebasestorage.app",
            messagingSenderId: "610040801324",
            appId: "1:610040801324:web:8a721b63ee8f7689118989"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let slikaBase64 = "";

        function login() {
            auth.signInWithEmailAndPassword(
                document.getElementById('email').value,
                document.getElementById('pass').value
            ).then(() => {
                document.getElementById('login').style.display = 'none';
                document.getElementById('admin').style.display = 'block';
                ucitaj();
            }).catch(e => alert(e.message));
        }

        function pretvoriUSliku(input) {
            if (input.files[0]) {
                let reader = new FileReader();
                reader.onload = e => {
                    slikaBase64 = e.target.result;
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function sacuvaj() {
            if (!slikaBase64 || !document.getElementById('naslov').value || !document.getElementById('cena').value) {
                alert("Popuni sve!");
                return;
            }
            
            try {
                await db.collection('radovi').add({
                    slika: slikaBase64,
                    naslov: document.getElementById('naslov').value,
                    cena: Number(document.getElementById('cena').value),
                    vreme: Date.now()
                });
                alert("OK");
                location.reload();
            } catch (e) {
                alert("GRESKA: " + e.message);
            }
        }

        async function ucitaj() {
            let html = "";
            let snapshot = await db.collection('radovi').orderBy('vreme').get();
            snapshot.forEach(doc => {
                let r = doc.data();
                html += `<div><img src="${r.slika}" style="max-width:200px"><br>${r.naslov} - ${r.cena}€</div><hr>`;
            });
            document.getElementById('lista').innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панел - Никола Гаћеша</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .admin-panel {
            background: white;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 20px;
            padding: 20px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .upload-area {
            border: 3px dashed #007bff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            background: #f0f8ff;
            cursor: pointer;
        }
        
        .upload-area:hover {
            background: #e6f3ff;
        }
        
        #fileInput {
            display: none;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            padding: 12px 25px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .status-btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .available { background: #28a745; color: white; }
        .reserved { background: #ffc107; color: black; }
        .sold { background: #dc3545; color: white; }
        
        .artworks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .art-card {
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }
        
        .art-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        
        .art-info {
            padding: 15px;
        }
        
        .quick-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .quick-actions button {
            padding: 5px 10px;
            font-size: 12px;
            margin: 2px;
        }
        
        #preview {
            max-width: 100%;
            max-height: 300px;
            margin: 20px 0;
            display: none;
            border-radius: 10px;
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="admin-panel">
        <h1>⚙️ Никола Гаћеша - Админ панел</h1>
        
        <script>
            const firebaseConfig = {
                apiKey: "AIzaSyB2M4L84Vmjd6QCs9J5HxtH9A8h1xoxR1o",
                authDomain: "nikola-gacesa-galerija.firebaseapp.com",
                projectId: "nikola-gacesa-galerija",
                storageBucket: "nikola-gacesa-galerija.firebasestorage.app",
                messagingSenderId: "610040801324",
                appId: "1:610040801324:web:8a721b63ee8f7689118989"
            };

            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            const auth = firebase.auth();
        </script>

        <!-- Login sekcija -->
        <div id="loginSection" style="text-align: center; padding: 40px;">
            <h2>🔐 Prijava</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Lozinka">
            <button onclick="login()">Prijavi se</button>
        </div>

        <!-- Admin sekcija -->
        <div id="adminSection" style="display: none;">
            <!-- Upload forma -->
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p>📸 Klikni ovde da izabereš sliku</p>
                <p style="font-size: 14px; color: #666;">(JPG, PNG - max 1MB)</p>
            </div>
            
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage(this)">
            
            <img id="preview" src="#">
            
            <input type="text" id="title" placeholder="Naziv dela">
            <input type="number" id="price" placeholder="Cena u €">
            <input type="text" id="technique" placeholder="Tehnika (npr. Ulje na platnu)">
            <input type="text" id="dimensions" placeholder="Dimenzije (npr. 80x100cm)">
            <textarea id="description" placeholder="Opis" rows="3"></textarea>
            
            <div style="margin: 20px 0;">
                <button class="status-btn available" onclick="setStatus('available')">🟢 Dostupno</button>
                <button class="status-btn reserved" onclick="setStatus('reserved')">🟡 Rezervisano</button>
                <button class="status-btn sold" onclick="setStatus('sold')">🔴 Prodato</button>
            </div>
            
            <button onclick="uploadArtwork()" style="width: 100%; background: #28a745;">📤 Objavi rad</button>
            
            <!-- Lista radova -->
            <h2 style="margin-top: 40px;">Postojeći radovi</h2>
            <div id="artworksList" class="artworks-grid"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentStatus = 'available';
        let selectedImageBase64 = '';

        function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('adminSection').style.display = 'block';
                    loadArtworks();
                })
                .catch(error => alert('Greška: ' + error.message));
        }

        function setStatus(status) {
            currentStatus = status;
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function uploadArtwork() {
            if (!selectedImageBase64) {
                alert('Izaberi sliku prvo!');
                return;
            }

            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;

            if (!title || !price) {
                alert('Unesi naziv i cenu!');
                return;
            }

            try {
                await db.collection('artworks').add({
                    title: title,
                    price: Number(price),
                    technique: document.getElementById('technique').value || 'Nepoznato',
                    dimensions: document.getElementById('dimensions').value || 'Nepoznato',
                    description: document.getElementById('description').value || '',
                    status: currentStatus,
                    imageBase64: selectedImageBase64,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    year: new Date().getFullYear()
                });

                alert('✅ Rad objavljen!');
                
                // Reset forme
                document.getElementById('title').value = '';
                document.getElementById('price').value = '';
                document.getElementById('technique').value = '';
                document.getElementById('dimensions').value = '';
                document.getElementById('description').value = '';
                document.getElementById('preview').style.display = 'none';
                selectedImageBase64 = '';
                
                loadArtworks();
            } catch (error) {
                alert('Greška: ' + error.message);
            }
        }

        async function loadArtworks() {
            const snapshot = await db.collection('artworks').orderBy('createdAt', 'desc').get();
            const list = document.getElementById('artworksList');
            list.innerHTML = '';

            snapshot.forEach(doc => {
                const art = doc.data();
                const id = doc.id;
                
                const card = document.createElement('div');
                card.className = 'art-card';
                
                card.innerHTML = `
                    <img src="${art.imageBase64}" alt="${art.title}">
                    <div class="art-info">
                        <h3>${art.title}</h3>
                        <p><strong>€${art.price}</strong></p>
                        <p>${art.technique} | ${art.dimensions}</p>
                        <p>Status: <span style="font-weight: bold;">${art.status}</span></p>
                        <div class="quick-actions">
                            <button onclick="updateStatus('${id}', 'available')" style="background: #28a745;">🟢</button>
                            <button onclick="updateStatus('${id}', 'reserved')" style="background: #ffc107;">🟡</button>
                            <button onclick="updateStatus('${id}', 'sold')" style="background: #dc3545;">🔴</button>
                            <button onclick="deleteArtwork('${id}')" style="background: #dc3545;">🗑</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function updateStatus(id, status) {
            await db.collection('artworks').doc(id).update({ status: status });
            loadArtworks();
        }

        async function deleteArtwork(id) {
            if (confirm('Siguran?')) {
                await db.collection('artworks').doc(id).delete();
                loadArtworks();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Nikola Gacesa - Admin</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #preview { max-width: 100%; display: none; margin: 10px 0; border-radius: 5px; }
        .rad { border: 1px solid #ddd; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .rad img { max-width: 100%; max-height: 150px; }
    </style>
    
    <!-- PRAVI Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <h1>Nikola Gacesa - Admin</h1>
        
        <!-- Login forma -->
        <div id="loginBox">
            <h3>Prijava</h3>
            <input type="email" id="email" placeholder="Email" value="nikola@gmail.com">
            <input type="password" id="password" placeholder="Lozinka" value="Nikola2024">
            <button onclick="login()">PRIJAVI SE</button>
        </div>
        
        <!-- Admin panel -->
        <div id="adminBox" style="display: none;">
            <h3>Dodaj novi rad</h3>
            <input type="file" id="slika" accept="image/*" onchange="pretvoriUSliku(this)">
            <img id="preview">
            
            <input type="text" id="naslov" placeholder="Naslov">
            <input type="number" id="cena" placeholder="Cena">
            
            <button onclick="sacuvaj()" style="background: #28a745;">SAČUVAJ RAD</button>
            
            <hr>
            <h3>Postojeći radovi</h3>
            <div id="lista"></div>
        </div>
    </div>

    <script>
        // TVOJ Firebase config (ispravljen)
        const firebaseConfig = {
            apiKey: "AIzaSyB2M4L84Vmjd6QCs9J5HxtH9A8h1xoxR1o",
            authDomain: "nikola-gacesa-galerija.firebaseapp.com",
            projectId: "nikola-gacesa-galerija",
            storageBucket: "nikola-gacesa-galerija.firebasestorage.app",
            messagingSenderId: "610040801324",
            appId: "1:610040801324:web:8a721b63ee8f7689118989"
        };

        // Inicijalizacija Firebase-a
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();  // ISPRAVLJENO
        const auth = firebase.auth();
        
        let slikaBase64 = "";

        // Login funkcija
        function login() {
            let email = document.getElementById('email').value;
            let pass = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('adminBox').style.display = 'block';
                    ucitajRadove();  // Učitaj radove posle logina
                })
                .catch(err => alert("Greška: " + err.message));
        }

        // Pretvori sliku u Base64
        function pretvoriUSliku(input) {  // ISPRAVLJENO ime
            if (input.files && input.files[0]) {
                let reader = new FileReader();
                reader.onload = function(e) {
                    slikaBase64 = e.target.result;
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Sačuvaj rad
        async function sacuvaj() {  // ISPRAVLJENO ime
            // Provera
            if (!slikaBase64) {
                alert("Izaberi sliku!");
                return;
            }
            
            let naslov = document.getElementById('naslov').value;
            let cena = document.getElementById('cena').value;
            
            if (!naslov || !cena) {
                alert("Unesi naslov i cenu!");
                return;
            }
            
            try {
                // Upis u Firestore
                await db.collection('radovi').add({
                    naslov: naslov,
                    cena: Number(cena),
                    slika: slikaBase64,
                    vreme: Date.now()
                });
                
                alert("Rad uspešno sačuvan!");
                
                // Reset forme
                document.getElementById('naslov').value = '';
                document.getElementById('cena').value = '';
                document.getElementById('preview').style.display = 'none';
                slikaBase64 = '';
                
                // Osveži listu
                ucitajRadove();
                
            } catch (error) {
                alert("Greška: " + error.message);
                console.error(error);
            }
        }

        // Učitaj radove
        async function ucitajRadove() {
            try {
                let snapshot = await db.collection('radovi').orderBy('vreme').get();
                let lista = document.getElementById('lista');
                lista.innerHTML = '';
                
                if (snapshot.empty) {
                    lista.innerHTML = '<p>Nema radova</p>';
                    return;
                }
                
                snapshot.forEach(doc => {
                    let r = doc.data();
                    lista.innerHTML += `
                        <div class="rad">
                            <img src="${r.slika}">
                            <p><strong>${r.naslov}</strong> - ${r.cena}€</p>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Greška pri učitavanju:", error);
            }
        }
    </script>
</body>
